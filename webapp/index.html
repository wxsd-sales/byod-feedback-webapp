<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting Room Feedback</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/vision_bundle.mjs"
        }
      }
    </script>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <main class="app-shell">
      <section class="feedback-experience" id="feedbackExperience">
        <header class="prompt-panel">
          <h1>Were you satisfied with this Meeting Room Experience?</h1>
        </header>

        <div class="camera-stage" id="cameraStage" aria-label="Webcam feedback detector">
          <video id="webcam" autoplay muted playsinline></video>
          <div class="mock-person" id="mockPerson" hidden aria-hidden="true">
            <div class="mock-neck"></div>
            <div class="mock-head"></div>

            <div class="mock-body">

            </div>
            <div class="mock-thumbs-up-arm">
              
              <div class="mock-forearm"></div>
              <div class="mock-hand">
                <div class="mock-thumb"></div>
                <div class="mock-fingers"></div>
              </div>
              <div class="mock-upper-arm"></div>
            </div>
          </div>

          <div
            class="gesture-confirmation"
            id="gestureConfirmation"
            data-gesture="waiting"
            aria-live="polite"
          >
            <div class="hold-ring" id="holdRing">
              <span class="thumb-mark" id="thumbMark">--</span>
            </div>
            <span class="hold-label" id="holdLabel">Show a thumbs up or thumbs down</span>
          </div>
        </div>

        <section class="feedback-choices" id="feedbackChoices" aria-label="Gesture choices">
          <div class="feedback-choice feedback-choice-up">
            <span class="choice-thumb" aria-hidden="true">👍</span>
            <span class="choice-label">Satisfied</span>
          </div>
          <div class="feedback-choice feedback-choice-down">
            <span class="choice-thumb" aria-hidden="true">👎</span>
            <span class="choice-label">Not Satisfied</span>
          </div>
        </section>

        <section class="thanks-panel" id="thanksPanel" hidden aria-live="polite">
          <span class="thanks-thumb" id="thanksThumb">--</span>
          <h2>Thanks for your feedback</h2>
          <p>Your response has been recorded.</p>
        </section>
      </section>
    </main>
  </body>
</html>
